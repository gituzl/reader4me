<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<title>reader4me</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="toolbar">
  <h1 class="brand">reader4me</h1>
  <div class="toolbar-actions">
    <button id="upload-btn" class="btn" type="button">📁 上传</button>
    <button id="paste-btn" class="btn" type="button">📋 粘贴</button>
    <select id="lang-select" class="select" aria-label="语言">
      <option value="auto">自动</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="ru">Русский</option>
    </select>
    <label class="font-size-label" title="字号">
      A<input id="font-size" type="range" min="14" max="28" value="18" step="1">A
    </label>
    <button id="theme-toggle" class="btn-icon" type="button" title="切换主题">🌓</button>
  </div>
</header>

<main>
  <section id="welcome" class="welcome">
    <h2>欢迎使用 reader4me</h2>
    <p>上传文本或粘贴内容,然后点击任意单词查看 IPA 音标和中文翻译。</p>
    <p>支持英语、法语、俄语。</p>
  </section>

  <textarea id="paste-area" class="paste-area" hidden placeholder="在此粘贴文本..."></textarea>
  <div id="paste-actions" class="paste-actions" hidden>
    <button id="paste-cancel" class="btn btn-secondary" type="button">取消</button>
    <button id="paste-load" class="btn btn-primary" type="button">载入</button>
  </div>

  <article id="reading-area" class="reading-area" aria-live="polite"></article>
</main>

<!-- Popup -->
<div id="popup" class="popup" hidden>
  <div class="popup-word"></div>
  <div class="popup-ipa"></div>
  <div class="popup-translation"></div>
</div>

<!-- Hidden file input -->
<input id="file-input" type="file" accept=".txt,text/plain" hidden>

<script src="app.js"></script>
</body>
</html>
